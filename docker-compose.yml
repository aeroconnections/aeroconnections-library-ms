services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=change-this-secret-key-in-production
      - ALLOWED_HOSTS=*
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
  static_volume:
  media_volume:
